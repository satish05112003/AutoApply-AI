version: '3.8'

services:
  # Database
  db:
    image: postgres:15-alpine
    container_name: autoapply_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autoapply_ai
    ports:
      - "${DB_PORT_HOST:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (Broker & Cache)
  redis:
    image: redis:7-alpine
    container_name: autoapply_redis
    ports:
      - "${REDIS_PORT_HOST:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: autoapply_qdrant
    ports:
      - "${QDRANT_PORT_HOST:-6333}:6333"
      - "${QDRANT_GRPC_PORT_HOST:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Object Storage (Local S3 mock)
  minio:
    image: minio/minio:latest
    container_name: autoapply_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_PORT_HOST:-9000}:9000"
      - "${MINIO_CONSOLE_PORT_HOST:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autoapply_backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/autoapply_ai
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_TYPE=minio
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_RESUMES=resumes
      - QDRANT_URL=http://qdrant:6333
      - JWT_SECRET_KEY=generate_a_very_long_secure_secret_key_here
      - FRONTEND_URL=http://localhost:${FRONTEND_PORT_HOST:-3000}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - BACKEND_PORT=8000
      - BACKEND_HOST=0.0.0.0
    ports:
      - "${BACKEND_PORT_HOST:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && python start.py"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Celery Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autoapply_worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/autoapply_ai
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_TYPE=minio
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_RESUMES=resumes
      - QDRANT_URL=http://qdrant:6333
      - JWT_SECRET_KEY=generate_a_very_long_secure_secret_key_here
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: celery -A app.celery_app.celery_app worker --loglevel=info
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Celery Beat
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autoapply_beat
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/autoapply_ai
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_TYPE=minio
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_RESUMES=resumes
      - QDRANT_URL=http://qdrant:6333
      - JWT_SECRET_KEY=generate_a_very_long_secure_secret_key_here
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app.celery_app beat --loglevel=info
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Next.js Frontend Dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autoapply_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT_HOST:-8000}/api/v1
    ports:
      - "${FRONTEND_PORT_HOST:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
